# =============================================================================
# Agentic AI SOC Platform — Docker Compose
# Phase 0: Infrastructure Skeleton
# =============================================================================
#
# Services: FastAPI (ingestion), Redis, MongoDB, Pipeline Worker
# Usage:    docker compose up --build -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redis — alert queue + Dead Letter Queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # MongoDB — case documents, alert history
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: soc-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Qdrant — vector store for the RAG knowledge layer (MITRE, runbooks, cases)
  # ---------------------------------------------------------------------------
  qdrant:
    # NOTE: pin to a specific version for production reproducibility (see
    # docs/production_todo.md). Using latest for initial development.
    image: qdrant/qdrant:latest
    container_name: soc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Ingestion Service — FastAPI receiving Wazuh webhooks
  # ---------------------------------------------------------------------------
  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: soc-ingestion
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - soc-network

  # ---------------------------------------------------------------------------
  # Pipeline Worker — reads from Redis, processes, writes to MongoDB
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: common/Dockerfile
    container_name: soc-worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - soc-network

# ---------------------------------------------------------------------------
# Volumes & Networks
# ---------------------------------------------------------------------------
volumes:
  redis-data:
  mongo-data:
  qdrant-data:

networks:
  # The main stack OWNS this network (fixed name so the separate Wazuh compose
  # can attach to it as `external`). This means `docker compose up` works on its
  # own during development — no manual `docker network create` needed.
  soc-network:
    name: soc-network
    driver: bridge
